services:
  librespeed:
    image: lscr.io/linuxserver/librespeed:latest
    container_name: librespeed
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=Etc/UTC
      - FILE__PASSWORD=/run/secrets/results_password
      - CUSTOM_RESULTS=false
      - DB_TYPE=sqlite
      - FILE__IPINFO_APIKEY=/run/secrets/ipinfo_api_key
    secrets:
      - results_password
      - ipinfo_api_key
    volumes:
      - /data/librespeed/config:/config
    ports:
      - 1234:80
    restart: unless-stopped

secrets:
  # Password for accessing the (internal) results page
  # You can generate one randomly.
  results_password:
    file: ./password.secret
  # Optional ipinfo.io API key
  ipinfo_api_key:
    file: ./ipinfo_api_key.secret
